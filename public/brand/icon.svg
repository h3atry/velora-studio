<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" fill="#0a0b12"/>
  <defs>
    <radialGradient id="core" cx="256" cy="168" r="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#00e5cc"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="left" x1="256" y1="200" x2="96" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00e5cc" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff4668"/>
    </linearGradient>
    <linearGradient id="right" x1="256" y1="200" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00e5cc" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#9b72f2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Auroras -->
  <path d="M256 220 C200 280, 140 360, 88 440" stroke="url(#left)" stroke-width="36" stroke-linecap="round" opacity="0.92"/>
  <path d="M256 220 C312 280, 372 360, 424 440" stroke="url(#right)" stroke-width="36" stroke-linecap="round" opacity="0.92"/>
  <path d="M256 220 C210 290, 160 370, 120 430" stroke="url(#left)" stroke-width="14" stroke-linecap="round" opacity="0.45"/>
  <path d="M256 220 C302 290, 352 370, 392 430" stroke="url(#right)" stroke-width="14" stroke-linecap="round" opacity="0.45"/>
  <!-- Núcleo -->
  <circle cx="256" cy="168" r="52" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="256" cy="168" r="68" stroke="#7c5cff" stroke-width="3" stroke-opacity="0.35"/>
</svg>
